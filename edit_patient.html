<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Patient - AquaSafe</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<!-- Navbar -->
<nav class="navbar navbar-dark bg-primary shadow">
    <div class="container">
        <span class="navbar-brand fw-bold">AquaSafe</span>

        <div>
            <a href="/dashboard" class="btn btn-light btn-sm">Dashboard</a>
            <a href="/patients" class="btn btn-warning btn-sm">View Patients</a>
        </div>
    </div>
</nav>

<!-- Form -->
<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-7">

            <div class="card shadow border-0">

                <div class="card-body p-4">

                    <h2 class="text-center mb-4 fw-bold text-primary">
                        Edit Patient
                    </h2>

                    <form method="POST">

                        <div class="mb-3">
                            <label class="form-label">Patient Name</label>
                            <input type="text" name="patient_name" class="form-control"
                                   value="{{ patient.patient_name }}" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Age</label>
                            <input type="number" name="age" class="form-control"
                                   value="{{ patient.age }}" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Gender</label>
                            <select name="gender" class="form-select" required>
                                <option selected>{{ patient.gender }}</option>
                                <option>Male</option>
                                <option>Female</option>
                                <option>Other</option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Village</label>
                            <input type="text" name="village" class="form-control"
                                   value="{{ patient.village }}" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Disease</label>
                            <input type="text" name="disease" class="form-control"
                                   value="{{ patient.disease }}" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Water Source</label>
                            <select name="water_source" class="form-select" required>
                                <option selected>{{ patient.water_source }}</option>
                                <option>River</option>
                                <option>Well</option>
                                <option>Tap</option>
                                <option>Borewell</option>
                                <option>Tank</option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Date Reported</label>
                            <input type="date" name="date_reported" class="form-control"
                                   value="{{ patient.date_reported }}" required>
                        </div>

                        <button type="submit" class="btn btn-primary w-100">
                            Update Patient
                        </button>

                    </form>

                </div>
            </div>

        </div>

    </div>

</div>

</body>
</html>
